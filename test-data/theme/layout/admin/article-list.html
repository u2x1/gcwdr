<div class="admin-content">
  <div class="toolbar">
    <h1 style="border: none; margin: 0; padding: 0;">Articles</h1>
    <div class="spacer"></div>
    <a href="/admin/articles/new" class="btn btn-primary">New Article</a>
  </div>
  <div class="card" style="padding: 0; overflow: hidden;">
    <table>
      <thead>
        <tr>
          <th>Title</th>
          <th>Date</th>
          <th>Category</th>
          <th>Path</th>
          <th style="width: 140px;">Actions</th>
        </tr>
      </thead>
      <tbody id="articleList">
        <tr><td colspan="5" style="text-align: center; color: #888; padding: 24px;">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>
<script>
(function() {
  fetch('/admin/api/articles', {credentials: 'same-origin'})
    .then(function(r) { return r.json(); })
    .then(function(articles) {
      var tbody = document.getElementById('articleList');
      if (articles.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#888;padding:24px;">No articles found.</td></tr>';
        return;
      }
      tbody.innerHTML = '';
      articles.forEach(function(a) {
        var tr = document.createElement('tr');
        tr.innerHTML =
          '<td style="font-weight:600;">' + esc(a.title || '(untitled)') + '</td>' +
          '<td style="color:#888;font-size:13px;">' + esc(a.date || '-') + '</td>' +
          '<td style="color:#888;font-size:13px;">' + esc(a.category || '-') + '</td>' +
          '<td style="font-size:12px;color:#aaa;font-family:Consolas,monospace;">' + esc(a.path) + '</td>' +
          '<td>' +
            '<a href="/admin/articles/edit?path=' + encodeURIComponent(a.path) + '" class="btn" style="padding:3px 10px;font-size:12px;">Edit</a> ' +
            '<button onclick="deleteArticle(\'' + esc(a.path).replace(/'/g, "\\'") + '\')" class="btn btn-danger" style="padding:3px 10px;font-size:12px;">Delete</button>' +
          '</td>';
        tbody.appendChild(tr);
      });
    });

  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  window.deleteArticle = function(path) {
    if (!confirm('Move "' + path + '" to trash?')) return;
    fetch('/admin/api/articles?path=' + encodeURIComponent(path), {
      method: 'DELETE',
      credentials: 'same-origin'
    }).then(function() { location.reload(); });
  };
})();
</script>
