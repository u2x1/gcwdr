<div class="admin-content">
  <h1>Dashboard</h1>
  <div class="stats">
    <div class="stat-card">
      <div class="value">[- this.article_count -]</div>
      <div class="label">Articles</div>
    </div>
    <div class="stat-card">
      <div class="value" style="font-size: 16px; padding-top: 8px;" id="buildStatusValue">[- this.build_status -]</div>
      <div class="label">Build Status</div>
    </div>
  </div>
  <div class="card">
    <h3>[- this.site_title -]</h3>
    <p style="color: #888; margin-top: 8px; font-size: 14px;">Manage your articles, preview content, and build the static site.</p>
  </div>
  <div style="margin-top: 16px; display: flex; gap: 8px;">
    <a href="/admin/articles" class="btn btn-primary">Manage Articles</a>
    <a href="/admin/articles/new" class="btn">New Article</a>
    <a href="/admin/build" class="btn">Build Site</a>
  </div>
</div>
